services:
  autoscaler:
    image: ghcr.io/crimeisdown/trunk-transcribe:${VERSION:-main}
    build:
      context: .
      dockerfile: docker/Dockerfile
      cache_from:
        - ghcr.io/crimeisdown/trunk-transcribe:main
    command:
      - uv
      - run
      - --directory
      - backend
      - python
      - scripts/autoscale-vast.py
      - --min-instances
      - ${AUTOSCALE_MIN_INSTANCES:-1}
      - --max-instances
      - ${AUTOSCALE_MAX_INSTANCES:-10}
      - --interval
      - ${AUTOSCALE_INTERVAL:-60}
      - --image
      - ${AUTOSCALE_WORKER_IMAGE:-ghcr.io/crimeisdown/trunk-transcribe:${VERSION:-main}}
    env_file: .env
    environment:
      - AUTOSCALE_BACKEND
      - AUTOSCALE_QUEUE
      - AUTOSCALE_WORKER_IMAGE
      - AUTOSCALE_GPU_RAM_MB
    volumes:
      - ./backend/app:/src/backend/app
      - ./backend/scripts:/src/backend/scripts
      - ./backend/alembic.ini:/src/backend/alembic.ini
      - ./backend/pyproject.toml:/src/backend/pyproject.toml
      - ./config:/src/config
      - ~/.vast_api_key:/root/.vast_api_key
    restart: always
