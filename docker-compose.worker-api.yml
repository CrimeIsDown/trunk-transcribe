services:
  worker-api:
    image: ghcr.io/crimeisdown/trunk-transcribe:${VERSION:-main}
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      cache_from:
        - ghcr.io/crimeisdown/trunk-transcribe:main
    command: worker
    volumes:
      - ./backend/app:/src/backend/app
      - ./backend/alembic.ini:/src/backend/alembic.ini
      - ./backend/pyproject.toml:/src/backend/pyproject.toml
      - ./config:/src/config
      - ./docker/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
      - ./docker/celery-healthcheck.sh:/usr/local/bin/celery-healthcheck.sh
    environment:
      - DEFAULT_TRANSCRIPTION_PROFILE=${DEFAULT_TRANSCRIPTION_PROFILE:-kind=vendor;provider=openai;model=whisper-1}
      - TRANSCRIPTION_PROFILE=${TRANSCRIPTION_PROFILE:-kind=vendor;provider=openai;model=whisper-1}
      - CELERY_QUEUES=${CELERY_QUEUES:-transcribe.remote.vendor}
      - WHISPER_MODEL
      - OPENAI_API_KEY
      - DEEPINFRA_API_KEY
      - DEEPINFRA_BASE_URL
      - CELERY_LOGLEVEL
      - CELERY_BROKER_URL
      - CELERY_RESULT_BACKEND
      - CELERY_CONCURRENCY
      - CELERY_PREFETCH_MULTIPLIER
    env_file: .env
    healthcheck:
      test: ["CMD", "celery-healthcheck.sh"]
      interval: 60s
      timeout: 30s
      retries: 1
      start_period: 60s
    restart: always
