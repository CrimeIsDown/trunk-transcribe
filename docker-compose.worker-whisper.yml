services:
  worker-whisper:
    image: ghcr.io/crimeisdown/trunk-transcribe:${VERSION:-main}
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      cache_from:
        - ghcr.io/crimeisdown/trunk-transcribe:main
    command: worker
    volumes:
      - ./backend/app:/src/backend/app
      - ./backend/alembic.ini:/src/backend/alembic.ini
      - ./backend/pyproject.toml:/src/backend/pyproject.toml
      - ./config:/src/config
      - ./docker/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
    environment:
      - DEFAULT_TRANSCRIPTION_PROFILE=${DEFAULT_TRANSCRIPTION_PROFILE:-kind=pool;platform=local;family=whisper;variant=large-v3;provider=speaches;model=Systran/faster-whisper-large-v3}
      - TRANSCRIPTION_PROFILE=kind=pool;platform=local;family=whisper;variant=large-v3;provider=speaches;model=Systran/faster-whisper-large-v3
      - CELERY_QUEUES=transcribe.remote.pool.local.whisper.large-v3
      - ASR_API_URL=${ASR_API_URL:-http://asr-whisper:8000/v1}
      - ASR_PROVIDER=${ASR_PROVIDER:-speaches}
      - ASR_VARIANT=${ASR_VARIANT:-large-v3}
      - ASR_MODEL=${ASR_MODEL:-Systran/faster-whisper-large-v3}
      - CELERY_LOGLEVEL
      - CELERY_BROKER_URL
      - CELERY_RESULT_BACKEND
      - CELERY_CONCURRENCY
      - CELERY_PREFETCH_MULTIPLIER
    env_file: .env
    depends_on:
      asr-whisper:
        condition: service_healthy
    restart: always

  asr-whisper:
    image: ${ASR_WHISPER_IMAGE:-ghcr.io/speaches-ai/speaches:latest-cuda}
    command:
      - sh
      - -lc
      - |
        python - <<'PY'
        import os
        from speaches.executors.whisper.utils import model_registry as whisper_model_registry

        model = os.environ["ASR_MODEL"]
        print(f"[speaches-init] validating model {model}", flush=True)
        if model not in [entry.id for entry in whisper_model_registry.list_remote_models()]:
            raise SystemExit(f"Unknown speaches ASR model: {model}")

        print(f"[speaches-init] ensuring model is cached: {model}", flush=True)
        was_downloaded = whisper_model_registry.download_model_files_if_not_exist(model)
        if was_downloaded:
            print(f"[speaches-init] model download completed: {model}", flush=True)
        else:
            print(f"[speaches-init] model already cached: {model}", flush=True)
        print("[speaches-init] starting speaches server", flush=True)
        PY
        exec uvicorn --factory speaches.main:create_app
    environment:
      - ASR_MODEL=${ASR_MODEL:-Systran/faster-distil-whisper-small.en}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen(
              "http://127.0.0.1:8000/v1/models?task=automatic-speech-recognition",
              timeout=5,
          )
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - whisper-asr-cache:/home/ubuntu/.cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: always

volumes:
  whisper-asr-cache:
