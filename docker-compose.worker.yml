services:
  worker:
    image: ghcr.io/crimeisdown/trunk-transcribe:${VERSION:-main}
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      cache_from:
        - ghcr.io/crimeisdown/trunk-transcribe:main
    command: worker
    volumes:
      - ./backend/app:/src/backend/app
      - ./backend/alembic.ini:/src/backend/alembic.ini
      - ./backend/pyproject.toml:/src/backend/pyproject.toml
      - ./config:/src/config
      - ./docker/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
      - ./docker/celery-healthcheck.sh:/usr/local/bin/celery-healthcheck.sh
    environment:
      - CELERY_QUEUES=post_transcribe
    env_file: .env
    healthcheck:
      test: ["CMD", "celery-healthcheck.sh"]
      interval: 60s
      timeout: 30s
      retries: 1
      start_period: 60s
    restart: always
